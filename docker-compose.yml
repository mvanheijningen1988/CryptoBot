services:
  manager:
    build:
      context: .
      dockerfile: manager/Dockerfile
    container_name: cryptobot-manager
    env_file:
      - manager/.env
    environment:
      MANAGER_BALANCE_CACHE_TTL_SECONDS: "15"
    ports:
      - "${MANAGER_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  agent1:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: cryptobot-agent1
    env_file:
      - agent/.env
    environment:
      AGENT_BALANCE_CACHE_TTL_SECONDS: "20"
      AGENT_TICKER_CACHE_TTL_SECONDS: "30"
    depends_on:
      - manager
    ports:
      - "${AGENT_PORT:-8100}:8100"
    volumes:
      - ./data:/app/data
    restart: unless-stopped